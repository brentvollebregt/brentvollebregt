name: Update README

on:
    workflow_dispatch:
    schedule:
        - cron: '0 0 * * *'

jobs: 
    update-readme-with-blog: 
        name: Update README with my latest blog posts
        runs-on: ubuntu-latest
        steps: 
            - uses: actions/checkout@v4
            - uses: gautamkrishnar/blog-post-workflow@6a6e64abd1f651445da8e59611d0ca0110979aa5 # v1
              with: 
                max_post_count: "8"
                feed_list: "https://nitratine.net/rss.xml"

